<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — FIN PARTNERS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center px-4 text-white bg-[#07111f]">

  <div class="fixed inset-0 -z-20 
bg-[radial-gradient(circle_at_10%_10%,rgba(56,189,248,0.18),transparent_22%),radial-gradient(circle_at_85%_15%,rgba(168,85,247,0.16),transparent_25%),radial-gradient(circle_at_50%_100%,rgba(59,130,246,0.12),transparent_30%),linear-gradient(180deg,#020617_0%,#0b1120_100%)]"></div>
  <div class="fixed inset-0 -z-10 bg-[linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.03)_1px,transparent_1px)] 
bg-[size:34px_34px] opacity-20"></div>

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex h-16 w-16 rounded-3xl bg-gradient-to-br from-cyan-400 via-sky-400 to-violet-500 items-center justify-center shadow-2xl shadow-cyan-500/20">
        <span class="text-slate-950 font-black text-3xl">F</span>
      </div>
      <h1 class="mt-5 text-4xl font-extrabold tracking-tight">FIN PARTNERS</h1>
      <p class="mt-3 text-slate-400">Create your affiliate account</p>
    </div>

    <div class="rounded-[32px] border border-white/10 bg-white/5 backdrop-blur-2xl p-8 shadow-2xl shadow-black/30">
      <h2 class="text-2xl font-bold mb-6">Регистрация</h2>

      <form method="POST" class="space-y-4">
        <div>
          <label class="mb-2 block text-sm text-slate-300">Email</label>
          <input
            type="email"
            name="email"
            required
            placeholder="you@example.com"
            class="w-full rounded-2xl border border-white/10 bg-slate-900/70 px-4 py-3 text-white placeholder:text-slate-500 outline-none focus:border-cyan-400"
          >
        </div>

        <div>
          <label class="mb-2 block text-sm text-slate-300">Пароль</label>
          <input
            type="password"
            name="password"
            required
            placeholder="••••••••"
            class="w-full rounded-2xl border border-white/10 bg-slate-900/70 px-4 py-3 text-white placeholder:text-slate-500 outline-none focus:border-cyan-400"
          >
        </div>

        <button
          type="submit"
          class="w-full rounded-2xl bg-gradient-to-r from-cyan-400 to-violet-500 px-4 py-3 font-bold text-slate-950 transition hover:scale-[1.01]"
        >
          Create account
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-slate-400">
        Уже есть аккаунт?
        <a href="/login" class="text-cyan-300 hover:text-cyan-200">Login</a>
      </div>
    </div>
  </div>

</body>
</html>
