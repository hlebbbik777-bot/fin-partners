<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — FIN PARTNERS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --bg:#07111f;
      --bg2:#0b1220;
      --panel:rgba(255,255,255,0.06);
      --line:rgba(255,255,255,0.10);
      --text:#eef4ff;
      --muted:#9aa9c7;
      --accent:#6d5dfc;
      --accent2:#18b7ff;
      --shadow:0 24px 70px rgba(0,0,0,0.35);
    }

    html[data-theme="light"]{
      --bg:#eef4ff;
      --bg2:#dbe7ff;
      --panel:rgba(255,255,255,0.78);
      --line:rgba(15,23,42,0.10);
      --text:#0f172a;
      --muted:#64748b;
      --accent:#4f46e5;
      --accent2:#0ea5e9;
      --shadow:0 20px 40px rgba(15,23,42,0.08);
    }

    body{
      background:
        radial-gradient(circle at 10% 10%, rgba(56,189,248,0.18), transparent 22%),
        radial-gradient(circle at 85% 15%, rgba(168,85,247,0.16), transparent 25%),
        radial-gradient(circle at 50% 100%, rgba(59,130,246,0.12), transparent 30%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color:var(--text);
    }

    .glass{
      background:linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)), var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(20px);
    }

    .field{
      width:100%;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.04);
      color:var(--text);
      border-radius:18px;
      padding:14px 16px;
      outline:none;
    }

    .btn-main{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;
      transition:.2s ease;
    }

    .btn-main:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
    }

    .txt-muted{ color:var(--muted); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex h-16 w-16 rounded-3xl bg-gradient-to-br from-cyan-400 via-sky-400 to-violet-500 items-center justify-center shadow-2xl shadow-cyan-500/20">
        <span class="text-slate-950 font-black text-3xl">F</span>
      </div>
      <h1 class="mt-5 text-4xl font-extrabold tracking-tight">FIN PARTNERS</h1>
      <p class="mt-3 txt-muted">Sign in to your affiliate dashboard</p>
    </div>

    <div class="glass rounded-[32px] p-8">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold">Вход</h2>
        <button id="themeToggle" type="button" class="rounded-2xl px-4 py-2 border border-white/10 bg-white/5 text-sm font-semibold">
          <span id="themeLabel">Dark</span>
        </button>
      </div>

      <form method="POST" class="space-y-4">
        <div>
          <label class="mb-2 block text-sm txt-muted">Email</label>
          <input type="email" name="email" required placeholder="you@example.com" class="field">
        </div>

        <div>
          <label class="mb-2 block text-sm txt-muted">Пароль</label>
          <input type="password" name="password" required placeholder="••••••••" class="field">
        </div>

        <button type="submit" class="w-full rounded-2xl px-4 py-3 font-bold btn-main">
          Login
        </button>
      </form>

      <div class="mt-6 text-center text-sm txt-muted">
        Нет аккаунта?
        <a href="/register" class="text-cyan-300 hover:text-cyan-200">Create account</a>
      </div>
    </div>
  </div>

  <script>
    const root = document.documentElement;
    const toggle = document.getElementById("themeToggle");
    const label = document.getElementById("themeLabel");

    const savedTheme = localStorage.getItem("theme") || "dark";
    root.setAttribute("data-theme", savedTheme);
    label.textContent = savedTheme === "light" ? "Light" : "Dark";

    toggle.addEventListener("click", () => {
      const current = root.getAttribute("data-theme");
      const next = current === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      label.textContent = next === "light" ? "Light" : "Dark";
    });
  </script>
</body>
</html>
