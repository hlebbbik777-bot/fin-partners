{% extends "base.html" %}

{% block content %}

<div class="glass rounded-[32px] p-8 mb-6">
  <h1 class="text-4xl font-extrabold tracking-tight txt-main">Офферы</h1>
  <p class="mt-3 txt-muted max-w-2xl leading-7">
    Активные банковские офферы с быстрым тестом и готовностью к публичным партнёрским ссылкам.
  </p>
</div>

<div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
  {% for offer in offers %}
  <div class="glass rounded-[30px] p-6">
    <div class="flex items-start justify-between gap-4">
      <div>
        <div class="inline-flex rounded-full px-3 py-1 text-xs font-bold tracking-[0.15em] uppercase bg-emerald-500/15 text-emerald-300 border border-emerald-400/20">
          Active
        </div>
        <h2 class="mt-4 text-2xl font-bold txt-main">{{ offer.name }}</h2>
      </div>
      <div class="h-14 w-14 rounded-2xl btn-main flex items-center justify-center text-white font-black shadow-lg">
        ₽
      </div>
    </div>

    <div class="mt-5 grid grid-cols-2 gap-4">
      <div class="glass-soft rounded-2xl p-4">
        <div class="text-xs uppercase tracking-[0.2em] txt-muted">Payout</div>
        <div class="mt-2 text-2xl font-bold txt-main">{{ offer.payout }} ₽</div>
      </div>
      <div class="glass-soft rounded-2xl p-4">
        <div class="text-xs uppercase tracking-[0.2em] txt-muted">Type</div>
        <div class="mt-2 text-2xl font-bold txt-main">CPL</div>
      </div>
    </div>

    <div class="mt-5 flex gap-3">
      <a href="/click/{{ offer.id }}" class="btn-main rounded-2xl px-5 py-3 font-bold">Тест клик</a>
      <a href="/flows" class="btn-ghost rounded-2xl px-5 py-3 font-bold">Мои ссылки</a>
    </div>
  </div>
  {% endfor %}
</div>

{% endblock %}
