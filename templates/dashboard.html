{% extends "base.html" %}

{% block content %}

<div class="cards">

<div class="card">
<div class="card-title">Клики</div>
<div class="card-value">{{ clicks }}</div>
</div>

<div class="card">
<div class="card-title">Лиды</div>
<div class="card-value">{{ leads }}</div>
</div>

<div class="card">
<div class="card-title">Доход</div>
<div class="card-value">{{ money }} ₽</div>
</div>

</div>


<div class="table">

<table>

<tr>
<th>ID</th>
<th>Оффер</th>
<th>Статус</th>
<th>Выплата</th>
<th>Дата</th>
</tr>

{% for lead in leads_table %}

<tr>

<td>{{ lead.id }}</td>
<td>{{ lead.name }}</td>
<td>{{ lead.status }}</td>
<td>{{ lead.payout }} ₽</td>
<td>{{ lead.created_at }}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
