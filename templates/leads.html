{% extends "base.html" %}

{% block content %}

<div class="card">

<h2>Лиды</h2>

<table>

<tr>
<th>ID</th>
<th>Оффер</th>
<th>Статус</th>
<th>Выплата</th>
<th>Дата</th>
</tr>

{% for lead in leads %}

<tr>

<td>{{ lead.id }}</td>
<td>{{ lead.offer_name }}</td>
<td>{{ lead.status }}</td>
<td>{{ lead.payout }} ₽</td>
<td>{{ lead.created_at }}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
