<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FIN PARTNERS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen text-white bg-[#07111f]">

  <div class="fixed inset-0 -z-20 
bg-[radial-gradient(circle_at_10%_10%,rgba(56,189,248,0.18),transparent_22%),radial-gradient(circle_at_85%_15%,rgba(168,85,247,0.16),transparent_25%),radial-gradient(circle_at_50%_100%,rgba(59,130,246,0.12),transparent_30%),linear-gradient(180deg,#020617_0%,#0b1120_100%)]"></div>
  <div class="fixed inset-0 -z-10 bg-[linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.03)_1px,transparent_1px)] 
bg-[size:34px_34px] opacity-20"></div>

  <div class="min-h-screen flex">
    <aside class="hidden md:flex w-72 flex-col border-r border-white/10 bg-white/5 backdrop-blur-2xl">
      <div class="px-6 py-6 border-b border-white/10">
        <div class="flex items-center gap-4">
          <div class="h-14 w-14 rounded-2xl bg-gradient-to-br from-cyan-400 via-sky-400 to-violet-500 flex items-center justify-center shadow-lg shadow-cyan-500/20">
            <span class="text-slate-950 font-black text-2xl">F</span>
          </div>
          <div>
            <div class="text-2xl font-extrabold tracking-tight">FIN PARTNERS</div>
            <div class="text-xs uppercase tracking-[0.25em] text-slate-400 mt-1">affiliate network</div>
          </div>
        </div>
      </div>

      <nav class="px-4 py-5 space-y-2">
        <a href="/dashboard" class="block rounded-2xl px-4 py-3 text-slate-200 hover:bg-white/10 transition">Dashboard</a>
        <a href="/offers" class="block rounded-2xl px-4 py-3 text-slate-200 hover:bg-white/10 transition">Offers</a>
        <a href="/flows" class="block rounded-2xl px-4 py-3 text-slate-200 hover:bg-white/10 transition">Flows</a>
        <a href="/leads" class="block rounded-2xl px-4 py-3 text-slate-200 hover:bg-white/10 transition">Leads</a>
        <a href="/payouts" class="block rounded-2xl px-4 py-3 text-slate-200 hover:bg-white/10 transition">Payouts</a>
        <a href="/profile" class="block rounded-2xl px-4 py-3 text-slate-200 hover:bg-white/10 transition">Profile</a>
        <a href="/logout" class="block rounded-2xl px-4 py-3 text-rose-300 hover:bg-rose-500/10 transition">Logout</a>
      </nav>

      <div class="mt-auto p-4">
        <div class="rounded-3xl border border-white/10 bg-white/5 p-5 backdrop-blur-xl">
          <div class="text-sm font-semibold text-white">FIN PARTNERS</div>
          <div class="mt-2 text-sm text-slate-400 leading-6">
            CPA platform with offers, leads, payouts and traffic tracking.
          </div>
        </div>
      </div>
    </aside>

    <main class="flex-1 min-w-0">
      <div class="md:hidden p-4">
        <div class="rounded-3xl border border-white/10 bg-white/5 backdrop-blur-2xl px-4 py-4 flex items-center justify-between">
          <div class="font-extrabold tracking-tight">FIN PARTNERS</div>
          <div class="text-xs uppercase tracking-[0.2em] text-slate-400">mobile</div>
        </div>
      </div>

      <div class="p-4 md:p-8">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

</body>
</html>
