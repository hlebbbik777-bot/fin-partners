<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FIN PARTNERS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{
      --bg:#07111f;
      --bg2:#0b1220;
      --panel:rgba(255,255,255,0.06);
      --panel2:rgba(255,255,255,0.04);
      --line:rgba(255,255,255,0.10);
      --text:#eef4ff;
      --muted:#9aa9c7;
      --accent:#6d5dfc;
      --accent2:#18b7ff;
      --shadow:0 24px 70px rgba(0,0,0,0.35);
    }

    html[data-theme="light"]{
      --bg:#eef4ff;
      --bg2:#dbe7ff;
      --panel:rgba(255,255,255,0.80);
      --panel2:rgba(255,255,255,0.65);
      --line:rgba(15,23,42,0.10);
      --text:#0f172a;
      --muted:#64748b;
      --accent:#4f46e5;
      --accent2:#0ea5e9;
      --shadow:0 20px 40px rgba(15,23,42,0.08);
    }

    body{
      background:
        radial-gradient(circle at 10% 10%, rgba(56,189,248,0.18), transparent 22%),
        radial-gradient(circle at 85% 15%, rgba(168,85,247,0.16), transparent 25%),
        radial-gradient(circle at 50% 100%, rgba(59,130,246,0.12), transparent 30%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color:var(--text);
    }

    .glass{
      background:linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)), var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(20px);
    }

    .glass-soft{
      background:var(--panel2);
      border:1px solid var(--line);
      backdrop-filter:blur(18px);
    }

    .txt-main{ color:var(--text); }
    .txt-muted{ color:var(--muted); }

    .field{
      width:100%;
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      border-radius:18px;
      padding:14px 16px;
      outline:none;
    }

    .btn-main{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;
      transition:.2s ease;
    }

    .btn-main:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
    }

    .btn-ghost{
      background:var(--panel2);
      border:1px solid var(--line);
      color:var(--text);
    }

    .table-shell{
      border:1px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      background:var(--panel2);
    }

    .table-shell table{
      width:100%;
      border-collapse:collapse;
    }

    .table-shell th{
      text-align:left;
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
      padding:16px 18px;
      background:rgba(255,255,255,0.03);
    }

    .table-shell td{
      padding:16px 18px;
      border-top:1px solid var(--line);
      color:var(--text);
    }

    .fade-up{
      animation:fadeUp .55s ease;
    }

    @keyframes fadeUp{
      from{ opacity:0; transform:translateY(14px); }
      to{ opacity:1; transform:translateY(0); }
    }

    .mobile-drawer{
      transform:translateX(-100%);
      transition:transform .25s ease;
    }

    .mobile-drawer.open{
      transform:translateX(0);
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="min-h-screen flex">

    <aside class="hidden md:flex w-72 flex-col glass border-r fade-up">
      <div class="px-6 py-6 border-b" style="border-color:var(--line)">
        <div class="flex items-center gap-4">
          <div class="h-14 w-14 rounded-2xl btn-main flex items-center justify-center shadow-lg">
            <span class="text-white font-black text-2xl">F</span>
          </div>
          <div>
            <div class="text-2xl font-extrabold tracking-tight txt-main">FIN PARTNERS</div>
            <div class="text-xs uppercase tracking-[0.25em] txt-muted mt-1">affiliate network</div>
          </div>
        </div>
      </div>

      <nav class="px-4 py-5 space-y-2">
        <a href="/dashboard" class="block rounded-2xl px-4 py-3 hover:bg-white/10 transition txt-main">Dashboard</a>
        <a href="/offers" class="block rounded-2xl px-4 py-3 hover:bg-white/10 transition txt-main">Offers</a>
        <a href="/flows" class="block rounded-2xl px-4 py-3 hover:bg-white/10 transition txt-main">Flows</a>
        <a href="/leads" class="block rounded-2xl px-4 py-3 hover:bg-white/10 transition txt-main">Leads</a>
        <a href="/payouts" class="block rounded-2xl px-4 py-3 hover:bg-white/10 transition txt-main">Payouts</a>
        <a href="/profile" class="block rounded-2xl px-4 py-3 hover:bg-white/10 transition txt-main">Profile</a>
        <a href="/logout" class="block rounded-2xl px-4 py-3 text-rose-300 hover:bg-rose-500/10 transition">Logout</a>
      </nav>
    </aside>

    <div id="mobileDrawer" class="mobile-drawer md:hidden fixed inset-y-0 left-0 z-50 w-72 glass p-5">
      <div class="flex items-center justify-between mb-6">
        <div class="text-2xl font-extrabold txt-main">FIN PARTNERS</div>
        <button id="closeDrawer" class="btn-ghost rounded-xl px-3 py-2">✕</button>
      </div>

      <nav class="space-y-2">
        <a href="/dashboard" class="block rounded-2xl px-4 py-3 hover:bg-white/10 transition txt-main">Dashboard</a>
        <a href="/offers" class="block rounded-2xl px-4 py-3 hover:bg-white/10 transition txt-main">Offers</a>
        <a href="/flows" class="block rounded-2xl px-4 py-3 hover:bg-white/10 transition txt-main">Flows</a>
        <a href="/leads" class="block rounded-2xl px-4 py-3 hover:bg-white/10 transition txt-main">Leads</a>
        <a href="/payouts" class="block rounded-2xl px-4 py-3 hover:bg-white/10 transition txt-main">Payouts</a>
        <a href="/profile" class="block rounded-2xl px-4 py-3 hover:bg-white/10 transition txt-main">Profile</a>
        <a href="/logout" class="block rounded-2xl px-4 py-3 text-rose-300 hover:bg-rose-500/10 transition">Logout</a>
      </nav>
    </div>

    <main class="flex-1 min-w-0">
      <div class="p-4 md:p-8">
        <div class="glass rounded-[30px] px-5 py-4 mb-6 flex items-center justify-between gap-4 fade-up">
          <div class="flex items-center gap-3">
            <button id="openDrawer" class="md:hidden btn-ghost rounded-2xl px-4 py-3 font-semibold">☰</button>
            <div>
              <div class="text-sm uppercase tracking-[0.25em] txt-muted">FIN PARTNERS</div>
              <div class="text-2xl font-extrabold tracking-tight txt-main">Affiliate Dashboard</div>
            </div>
          </div>

          <button id="themeToggle" class="btn-ghost rounded-2xl px-4 py-3 font-semibold flex items-center gap-3" type="button">
            <span id="themeIcon">🌙</span>
            <span id="themeLabel">Dark</span>
          </button>
        </div>

        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <script>
    const root = document.documentElement;
    const themeToggle = document.getElementById("themeToggle");
    const themeLabel = document.getElementById("themeLabel");
    const themeIcon = document.getElementById("themeIcon");

    const savedTheme = localStorage.getItem("theme") || "dark";
    root.setAttribute("data-theme", savedTheme);
    updateThemeText(savedTheme);

    function updateThemeText(theme){
      if(theme === "light"){
        themeLabel.textContent = "Light";
        themeIcon.textContent = "☀️";
      } else {
        themeLabel.textContent = "Dark";
        themeIcon.textContent = "🌙";
      }
    }

    themeToggle.addEventListener("click", () => {
      const current = root.getAttribute("data-theme");
      const next = current === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      updateThemeText(next);
    });

    const drawer = document.getElementById("mobileDrawer");
    const openDrawer = document.getElementById("openDrawer");
    const closeDrawer = document.getElementById("closeDrawer");

    if (openDrawer) {
      openDrawer.addEventListener("click", () => drawer.classList.add("open"));
    }

    if (closeDrawer) {
      closeDrawer.addEventListener("click", () => drawer.classList.remove("open"));
    }
  </script>
</body>
</html>
