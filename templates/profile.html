{% extends "base.html" %}
{% block title %}Kirgey228 — профиль{% endblock %}

{% block content %}
<div class="grid-2">
  <div class="panel">
    <h1>Профиль партнёра</h1>
    <p class="muted">Настрой личные данные, контакт и рабочий профиль для сети.</p>

    <div class="form-row">
      <label class="label">
        Имя
        <input class="input" placeholder="Kirgey">
      </label>

      <label class="label">
        Telegram
        <input class="input" placeholder="@username">
      </label>
    </div>

    <label class="label">
      Email
      <input class="input" placeholder="you@example.com">
    </label>

    <label class="label">
      Описание
      <textarea class="textarea" placeholder="Например: арбитраж, банки, трафик из Telegram"></textarea>
    </label>

    <button class="btn btn-primary">Сохранить профиль</button>
  </div>

  <div class="panel">
    <img
      class="hero-image"
      src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=1200&q=80"
      alt="Profile"
    >
  </div>
</div>
{% endblock %}
