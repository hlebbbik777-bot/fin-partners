{% extends "base.html" %}

{% block content %}

<div class="glass rounded-[32px] p-8 mb-6">
  <h1 class="text-4xl font-extrabold tracking-tight txt-main">Выплаты</h1>
  <p class="mt-3 txt-muted max-w-2xl leading-7">
    Сохраняй реквизиты для выплат и держи аккаунт готовым к выводу средств.
  </p>
</div>

<div class="grid grid-cols-1 xl:grid-cols-3 gap-6 mb-6">
  <div class="glass rounded-[28px] p-6">
    <div class="text-xs uppercase tracking-[0.25em] txt-muted">Balance</div>
    <div class="mt-4 text-5xl font-extrabold stat-num txt-main">{{ user.balance or 0 }} ₽</div>
    <div class="mt-3 txt-muted">доступно к выплате</div>
  </div>

  <div class="glass rounded-[28px] p-6">
    <div class="text-xs uppercase tracking-[0.25em] txt-muted">Minimum</div>
    <div class="mt-4 text-3xl font-extrabold txt-main">1000 ₽</div>
    <div class="mt-3 txt-muted">минимальная заявка</div>
  </div>

  <div class="glass rounded-[28px] p-6">
    <div class="text-xs uppercase tracking-[0.25em] txt-muted">Status</div>
    <div class="mt-4 text-3xl font-extrabold txt-main">OPEN</div>
    <div class="mt-3 txt-muted">выплаты доступны</div>
  </div>
</div>

<div class="glass rounded-[32px] p-8">
  <h2 class="text-2xl font-bold txt-main mb-6">Реквизиты для выплат</h2>

  <form method="POST" class="space-y-5">
    <div>
      <label class="block mb-2 text-sm txt-muted">Тип выплаты</label>
      <select name="method" class="field">
        <option value="СБП" {% if user.payout_method == "СБП" %}selected{% endif %}>СБП</option>
        <option value="Карта" {% if user.payout_method == "Карта" %}selected{% endif %}>Карта</option>
        <option value="USDT" {% if user.payout_method == "USDT" %}selected{% endif %}>USDT</option>
      </select>
    </div>

    <div>
      <label class="block mb-2 text-sm txt-muted">Реквизиты</label>
      <input
        type="text"
        name="details"
        value="{{ user.payout_details or '' }}"
        placeholder="+7 999 123-45-67 / номер карты / TRC20"
        class="field"
      >
    </div>

    <button type="submit" class="btn-main rounded-2xl px-5 py-3 font-bold">
      Сохранить реквизиты
    </button>
  </form>
</div>

{% endblock %}
