{% extends "base.html" %}

{% block content %}

<div class="glass rounded-[32px] p-8 mb-6">
  <h1 class="text-4xl font-extrabold tracking-tight txt-main">Партнёрские ссылки</h1>
  <p class="mt-3 txt-muted max-w-2xl leading-7">
    Здесь находятся твои готовые ссылки для трафика. Можно копировать и тестировать сразу.
  </p>
</div>

<div class="glass rounded-[32px] p-8">
  <div class="table-shell">
    <table>
      <thead>
        <tr>
          <th>Оффер</th>
          <th>Выплата</th>
          <th>Ссылка</th>
        </tr>
      </thead>
      <tbody>
        {% for offer in offers %}
        <tr>
          <td>{{ offer.name }}</td>
          <td>{{ offer.payout }} ₽</td>
          <td>
            <input
              type="text"
              readonly
              value="https://fin-partners.onrender.com/go/{{ offer.id }}?ref={{ user_id }}"
              class="field"
            >
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
