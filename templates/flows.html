{% extends "base.html" %}

{% block content %}

<div class="glass rounded-[32px] p-8 mb-6 fade-up">
  <h1 class="text-4xl font-extrabold tracking-tight txt-main">Партнёрские ссылки</h1>
  <p class="mt-3 txt-muted max-w-2xl leading-7">
    Здесь находятся твои готовые ссылки для трафика. Можно копировать и тестировать сразу.
  </p>
</div>

<div class="glass rounded-[32px] p-8 fade-up">
  <div class="table-shell">
    <table>
      <thead>
        <tr>
          <th>Оффер</th>
          <th>Выплата</th>
          <th>Ссылка</th>
          <th>Действие</th>
        </tr>
      </thead>
      <tbody>
        {% for offer in offers %}
        <tr>
          <td>{{ offer.name }}</td>
          <td>{{ offer.payout }} ₽</td>
          <td>
            <input
              id="flow-{{ offer.id }}"
              type="text"
              readonly
              value="https://fin-partners.onrender.com/go/{{ offer.id }}?ref={{ user_id }}"
              class="field"
            >
          </td>
          <td>
            <button
              type="button"
              class="btn-main rounded-2xl px-4 py-3 font-bold"
              onclick="copyFlow('flow-{{ offer.id }}', this)"
            >
              Копировать
            </button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<script>
  function copyFlow(id, btn){
    const input = document.getElementById(id);
    navigator.clipboard.writeText(input.value);
    showToast("Ссылка скопирована");
  }
</script>

{% endblock %}
